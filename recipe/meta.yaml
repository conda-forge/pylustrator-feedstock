{% set name = "pylustrator" %}
{% set version = "1.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pylustrator-{{ version }}.tar.gz
  sha256: 8a503e7f793756f9222cab21e88c0625a3df3cd1efc05d99e5eac64188a89588

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - poetry-core
    - pip
  run:
    - python >={{ python_min }},<4.0
    - natsort >=2.0.0
    - numpy >=1.0.3
    - matplotlib-base >=2.0.2
    - pyqt >=5.6
    - qtawesome >=0.5.0
    - scikit-image >=0.7.0
    # - qtpy

test:
  imports:
    - pylustrator
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/rgerum/pylustrator
  summary: Adds interactivity to arrange panels in matplotlib
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ocefpaf
